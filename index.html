<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tic-Tac-Toe</title>
    <style>
        /* CSS untuk Tampilan dan Responsivitas */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Membuat lebar responsif: akan penuh di HP, tapi maksimal 400px di laptop */
            width: 90%; 
            max-width: 400px;
        }

        h1 {
            margin-top: 0;
            color: #00d2ff;
            font-size: 2rem;
        }

        #status {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .cell {
            aspect-ratio: 1; /* Membuat kotak selalu persegi panjangnya */
            background: #2a2a2a;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        /* Efek saat tombol disentuh/diklik */
        .cell:hover {
            background: #3a3a3a;
        }
        .cell:active {
            transform: scale(0.95);
        }

        /* Warna untuk X dan O */
        .cell.x { color: #ff4757; }
        .cell.o { color: #2ed573; }

        button {
            background: #00d2ff;
            color: #121212;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
            width: 100%;
        }

        button:hover {
            background: #00a8cc;
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        <div id="status">Giliran: X</div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="reset">Main Lagi</button>
    </div>

    <script>
        // JavaScript untuk Logika Permainan
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');
        const resetButton = document.getElementById('reset');
        
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let running = false;

        // Kondisi garis kemenangan (horizontal, vertikal, diagonal)
        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], 
            [0, 3, 6], [1, 4, 7], [2, 5, 8], 
            [0, 4, 8], [2, 4, 6]             
        ];

        initializeGame();

        function initializeGame() {
            cells.forEach(cell => cell.addEventListener('click', cellClicked));
            resetButton.addEventListener('click', restartGame);
            statusText.textContent = `Giliran: ${currentPlayer}`;
            running = true;
        }

        function cellClicked() {
            const cellIndex = this.getAttribute('data-index');

            // Jika kotak sudah terisi atau game berhenti, abaikan klik
            if (board[cellIndex] !== "" || !running) {
                return;
            }

            updateCell(this, cellIndex);
            checkWinner();
        }

        function updateCell(cell, index) {
            board[index] = currentPlayer;
            cell.textContent = currentPlayer;
            // Menambahkan class untuk memberi warna berbeda pada X dan O
            cell.classList.add(currentPlayer.toLowerCase());
        }

        function changePlayer() {
            currentPlayer = (currentPlayer === "X") ? "O" : "X";
            statusText.textContent = `Giliran: ${currentPlayer}`;
        }

        function checkWinner() {
            let roundWon = false;

            for (let i = 0; i < winConditions.length; i++) {
                const condition = winConditions[i];
                const cellA = board[condition[0]];
                const cellB = board[condition[1]];
                const cellC = board[condition[2]];

                if (cellA === "" || cellB === "" || cellC === "") {
                    continue;
                }
                if (cellA === cellB && cellB === cellC) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusText.textContent = `Pemain ${currentPlayer} Menang! 🎉`;
                running = false;
            } else if (!board.includes("")) {
                statusText.textContent = "Yah, Seri! 🤝";
                running = false;
            } else {
                changePlayer();
            }
        }

        function restartGame() {
            currentPlayer = "X";
            board = ["", "", "", "", "", "", "", "", ""];
            statusText.textContent = `Giliran: ${currentPlayer}`;
            cells.forEach(cell => {
                cell.textContent = "";
                cell.classList.remove("x", "o");
            });
            running = true;
        }
    </script>
</body>
</html>
